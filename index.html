<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART QR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
}

.main{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.top-section{
    background:#111;
    height:180px;
    border-bottom-left-radius:50px;
    border-bottom-right-radius:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.top-section::after{
    content:'';
    position:absolute;
    bottom:18px;
    width:100%;
    height:3px;
    background:#f4b400;
}

.logo{
    width:220px;
}

.profile-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:-60px;
    z-index:10;
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #f4b400;
    background:#111;
    box-shadow:0 0 25px rgba(244,180,0,0.4);
}

.name{
    margin-top:20px;
    font-size:40px;
    font-weight:900;
    color:#111;
}

.line{
    width:120px;
    height:4px;
    background:#f4b400;
    border-radius:50px;
    margin-top:10px;
}

.icons-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:40px;
    padding:20px;
}

.icons-grid{
    display:grid;
    grid-template-columns:repeat(3,120px);
    gap:22px;
    justify-content:center;
}

.icon-btn{
    width:120px;
    height:120px;
    background:#111;
    border-radius:28px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    box-shadow:
    0 10px 25px rgba(0,0,0,0.2),
    inset 0 -3px 0 #f4b400;
    transition:0.25s;
}

.icon-btn:hover{
    transform:translateY(-6px) scale(1.03);
}

.icon-btn i{
    font-size:42px;
}

.phone-text{
    color:white;
    margin-top:8px;
    font-weight:700;
    font-size:20px;
}

.facebook{color:#1877f2;}
.whatsapp{color:#25d366;}
.instagram{
    background:linear-gradient(
    45deg,
    #feda75,
    #fa7e1e,
    #d62976,
    #962fbf,
    #4f5bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.tiktok{color:white;}
.snapchat{color:#fffc00;}
.telegram{color:#229ED9;}
.phone{color:#f4b400;}

.bottom-section{
    background:#111;
    height:110px;
    border-top-left-radius:50px;
    border-top-right-radius:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
    position:relative;
    overflow:hidden;
}

.bottom-section::before{
    content:'';
    position:absolute;
    top:18px;
    width:100%;
    height:3px;
    background:#f4b400;
}

.footer-text{
    color:white;
    font-size:20px;
    font-weight:700;
    letter-spacing:2px;
}

.footer-text span{
    color:#f4b400;
}

.message{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-size:32px;
    font-weight:700;
}

@media(max-width:600px){

    .icons-grid{
        grid-template-columns:repeat(2,120px);
    }

    .name{
        font-size:34px;
    }

}

</style>
</head>

<body>

<div id="app"></div>

<script>

const csvUrl =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYzdnsvSpaFn__hpVxQlKvw2HX5zt0Yb7XnSuDGLLqYWr015v9kilVG574E3A0wbdzCr0krQHvlEG-/pub?output=csv';

const params = new URLSearchParams(window.location.search);

const id = params.get('id');

const app = document.getElementById('app');

fetch(csvUrl)
.then(res => res.text())
.then(text => {

    const rows = text.trim().split('\n').map(r => r.split(','));

    const headers = rows.shift();

    let found = false;

    rows.forEach(row => {

        const user = {};

        headers.forEach((h,i)=>{
            user[h.trim()] = row[i]?.trim();
        });

        if(user.ID === id && user.Active === 'YES'){

            found = true;

            const name = user.Name || '';

            let buttons = '';

            if(user.facebook && user.facebook !== 'NO'){
                buttons += `
                <a class="icon-btn" href="${user.facebook}" target="_blank">
                    <i class="fab fa-facebook-f facebook"></i>
                </a>`;
            }

            if(user.whatsapp && user.whatsapp !== 'NO'){
                buttons += `
                <a class="icon-btn"
                href="https://wa.me/${user.whatsapp}"
                target="_blank">
                    <i class="fab fa-whatsapp whatsapp"></i>
                </a>`;
            }

            if(user.Phone){
                buttons += `
                <a class="icon-btn"
                href="tel:${user.Phone}">
                    <i class="fas fa-phone-volume phone"></i>
                    <div class="phone-text">اتصال</div>
                </a>`;
            }

            if(user.instagram && user.instagram !== 'NO'){
                buttons += `
                <a class="icon-btn" href="${user.instagram}" target="_blank">
                    <i class="fab fa-instagram instagram"></i>
                </a>`;
            }

            if(user.tiktok && user.tiktok !== 'NO'){
                buttons += `
                <a class="icon-btn" href="${user.tiktok}" target="_blank">
                    <i class="fab fa-tiktok tiktok"></i>
                </a>`;
            }

            if(user.snapchat && user.snapchat !== 'NO'){
                buttons += `
                <a class="icon-btn" href="${user.snapchat}" target="_blank">
                    <i class="fab fa-snapchat snapchat"></i>
                </a>`;
            }

            if(user.telegram && user.telegram !== 'NO'){
                buttons += `
                <a class="icon-btn" href="${user.telegram}" target="_blank">
                    <i class="fab fa-telegram telegram"></i>
                </a>`;
            }

            const profileImage =
            `https://smartqr2026-arch.github.io/smart-qr/users/${id}.jpg`;

            app.innerHTML = `

            <div class="main">

                <div class="top-section">
                    <img class="logo" src="logo.png">
                </div>

                <div class="profile-wrapper">

                    <img
                    id="user-image"
                    class="profile-image"
                    src="${profileImage}"
                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'"
                    >

                    <div class="name">${name}</div>

                    <div class="line"></div>

                </div>

                <div class="icons-wrapper">
                    <div class="icons-grid">
                        ${buttons}
                    </div>
                </div>

                <div class="bottom-section">
                    <div class="footer-text">
                        SCAN • CONNECT • <span>CARE</span>
                    </div>
                </div>

            </div>

            `;
        }

    });

    if(!found){

        app.innerHTML = `
        <div class="message">
        غير موجود QR
        </div>
        `;
    }

});

</script>

</body>
</html>
