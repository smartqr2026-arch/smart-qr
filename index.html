<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART QR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#000;
min-height:100vh;
overflow-x:hidden;
direction:rtl;
}

.main{
position:relative;
min-height:100vh;
background:url('background.png');
background-size:100% 100%;
background-repeat:no-repeat;
background-position:center;
overflow:hidden;
}

.top-section{
background:transparent;
padding:40px 20px 20px;
text-align:center;
}
  
.logo{
width:190px;
margin:auto;
display:block;
object-fit:contain;
}
  
.profile-wrapper{
position:relative;
margin-top:-20px;
z-index:10;
text-align:center;
}

.profile-image{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #d4af37;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}
.name{
margin-top:15px;
font-size:32px;
font-weight:800;
color:#222;
}


.icons-wrapper{
padding:40px 12px 120px;
max-width:700px;
margin:auto;
}

.icons-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:22px;
max-width:600px;
margin:auto;
}

.icons-grid .card{
width:170px;
}

.card{
background:linear-gradient(
145deg,
#1d1d1d,
#0b0b0b
);

width:100%;
aspect-ratio:1/1;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

position:relative;
overflow:hidden;

box-shadow:
0 8px 18px rgba(0,0,0,.25),
0 3px 8px rgba(0,0,0,.15);

transition:.25s ease;
}

.card::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(
135deg,
rgba(255,255,255,.06),
transparent 60%
);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.card i{
font-size:53px;
position:relative;
z-index:2;
}

.contact-card{
height:95px;
border-radius:20px;
flex-direction:row;
justify-content:center;
gap:14px;
padding:0 18px;
}

.contact-card i{
font-size:42px;
color:#d4af37;
flex-shrink:0;
}

.contact-card .call-text{
margin-top:0;
font-size:24px;
}
.card{
box-sizing:border-box;
}

.social-circle{
width:74px;
height:74px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 4px 10px rgba(0,0,0,.25),
inset 0 1px 2px rgba(255,255,255,.08);
}

.social-circle i{
font-size:42px;
}
.phone-icon{color:#ffc400;}
.whatsapp-circle{
background:#25D366;
}

.whatsapp-circle{
background:#25D366;
}

.whatsapp-icon{
color:#fff;
}
.facebook-circle{
background:#1877F2;
}

.facebook-icon{
color:#fff;
}

.instagram-circle{
background:linear-gradient(
45deg,
#f9ce34,
#ee2a7b,
#6228d7
);
}

.instagram-icon{
color:#fff;
background:none;
-webkit-text-fill-color:#fff;
}

.tiktok-icon{
color:#fff;

text-shadow:
-2px 0 #25F4EE,
2px 0 #FE2C55;
}
  
.snapchat-circle{
background:#FFFC00;
}

.snapchat-icon{
color:#fff;
}
  
.telegram-circle{
background:#2AABEE;
}

.telegram-icon{
color:#fff;
}
  
.website-icon{color:#ffc400;}
  
.email-circle{
background:#4A90E2;
}

.email-icon{
color:#fff;
}

.call-text{
margin-top:14px;
font-size:28px;
font-weight:700;
color:#fff;
position:relative;
z-index:2;
}

.message{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:800;
color:#fff;
padding:20px;
text-align:center;
background:#000;
}

@media(max-width:768px){

.logo{
width:180px;
}

.profile-image{
width:120px;
height:120px;
}

.name{
font-size:34px;
}

.icons-grid{
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.card{
min-height:150px;
}

.card i{
font-size:52px;
}

}

@media(max-width:500px){

.icons-grid{
grid-template-columns:repeat(3,1fr);
}

.contact-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:22px;
max-width:600px;
margin:0 auto 22px;
}

.contact-grid:has(.contact-card:only-child){
grid-template-columns:260px;
justify-content:center;
}
  
.card{
min-height:135px;
border-radius:28px;
}

.card i{
font-size:46px;
}

.call-text{
font-size:24px;
}

.contact-card{
text-align:right;
}

.contact-text{
display:flex;
flex-direction:column;
align-items:flex-start;
}

.contact-title{
font-size:19px;
font-weight:800;
line-height:1.1;
color:#fff;
}

.contact-subtitle{
font-size:7px;
font-weight:600;
line-height:1.2;
color:#d8d8d8;
margin-top:4px;
}

.name{
font-size:24px;
}

.footer-text{
font-size:22px;
}

}

</style>
</head>

<body>

<div id="app">

<div class="message">
جاري التحميل...
</div>

</div>

<script>

// رابط CSV
const csvURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTYzdnsvSpaFn__hpVxQlKvw2HX5zt0Yb7XnSuDGLLqYWr015v9kilVG574E3A0wbdzCr0krQHvlEG-/pub?output=csv";

// قراءة ID من الرابط
const params = new URLSearchParams(window.location.search);

const qrId = params.get("id");

// عنصر التطبيق
const app = document.getElementById("app");

// إذا لا يوجد ID
if(!qrId){

app.innerHTML = `
<div class="message">
QR غير موجود
</div>
`;

}else{

fetch(csvURL)

.then(res => res.text())

.then(data => {

const rows = data.trim().split("\n").slice(1);

let found = false;

rows.forEach(row => {

const cols = row.split(",");

const ID = cols[0]?.trim();
const active = cols[1]?.trim();
const phone = cols[2]?.trim();
const emergency = cols[10]?.replace(/'/g, "").trim();
console.log(cols);
const whatsapp = cols[3]?.trim();
const waNumber = whatsapp
.replace(/\s/g, "")
.replace(/[^\d]/g, "")
.replace(/^0/, "962");
const facebook = cols[4]?.trim();
const instagram = cols[5]?.trim();
const tiktok = cols[6]?.trim();
const snapchat = cols[7]?.trim();
const telegram = cols[8]?.trim();
const name = cols[9]?.trim();
const website = cols[11]?.trim();
const email = cols[12]?.trim();
  
// مطابقة ID
if(ID === qrId){

found = true;

// إذا غير مفعل
if(active !== "YES"){

app.innerHTML = `
<div class="message">
QR غير مفعل
</div>
`;

return;

}

let contactButtons = "";
let socialButtons = "";
  
// اتصال
if(phone && phone !== "NO"){

contactButtons += `
<a class="card contact-card" href="tel:${phone}">
<i class="fa-solid fa-phone-volume phone-icon"></i>
<div class="contact-text">
<div class="contact-title">اتصال</div>
<div class="contact-subtitle">اتصل مباشرة</div>
</div>
</a>
`;

}
// رقم طوارئ
if(emergency && emergency !== "NO"){

contactButtons += `
<a class="card contact-card" href="tel:${emergency}">
<i class="fa-solid fa-user-check phone-icon"></i>
<div class="contact-text">
<div class="contact-title">شخص معرّف</div>
<div class="contact-subtitle">يعرف صاحب البطاقة</div>
</div>
</a>
`;

}

// واتساب
if(whatsapp && whatsapp !== "NO"){

const waNumber = whatsapp.replace(/^0/, "962");

socialButtons += `
<a class="card" href="https://wa.me/${waNumber}" target="_blank">
<div class="social-circle whatsapp-circle">
<i class="fa-brands fa-whatsapp whatsapp-icon"></i>
</div>
</a>
`;

}

// فيسبوك
if(facebook && facebook !== "NO"){

socialButtons += `
<a class="card" href="${facebook}" target="_blank">
<div class="social-circle facebook-circle">
<i class="fa-brands fa-facebook-f facebook-icon"></i>
</div>
</a>
`;

}

// انستجرام
if(instagram && instagram !== "NO"){

socialButtons += `
<a class="card" href="${instagram}" target="_blank">
<div class="social-circle instagram-circle">
<i class="fa-brands fa-instagram instagram-icon"></i>
</div>
</a>
`;

}

// تيك توك
if(tiktok && tiktok !== "NO"){

socialButtons += `
<a class="card" href="${tiktok}" target="_blank">
<div class="social-circle tiktok-circle">
<i class="fa-brands fa-tiktok tiktok-icon"></i>
</div>
</a>
`;

}

// سناب
if(snapchat && snapchat !== "NO"){

socialButtons += `
<a class="card" href="${snapchat}" target="_blank">
<div class="social-circle snapchat-circle">
<i class="fa-brands fa-snapchat snapchat-icon"></i>
</div>
</a>
`;

}

// تيليجرام
if(telegram && telegram !== "NO"){

socialButtons += `
<a class="card" href="${telegram}" target="_blank">
<div class="social-circle telegram-circle">
<i class="fa-brands fa-telegram telegram-icon"></i>
</div>
</a>
`;

}

// Website
if(website && website !== "NO"){

socialButtons += `
<a class="card" href="${website}" target="_blank">
<div class="social-circle website-circle">
<i class="fa-solid fa-globe website-icon"></i>
</div>
</a>
`;

}

// Email
if(email && email !== "NO"){

socialButtons += `
<a class="card" href="mailto:${email}">
<div class="social-circle email-circle">
<i class="fa-solid fa-envelope email-icon"></i>
</div>
</a>
`;

}
// صورة المستخدم
const profileImage =
`https://smartqr2026-arch.github.io/smart-qr/users/${ID}.jpg`;

// عرض الصفحة
app.innerHTML = `

<div class="main">

<div class="top-section">

<img class="logo" src="logo.png">

</div>

<div class="profile-wrapper">

<img
class="profile-image"
src="${profileImage}"

onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">

<div class="name">
${name}
</div>

<div class="line"></div>

</div>

<div class="icons-wrapper">

<div class="contact-grid">

${contactButtons}

</div>

<div class="icons-grid">

${socialButtons}

</div>

</div>

<div class="bottom-section">


</div>

</div>

`;

}

});

// إذا لم يجد المستخدم
if(!found){

app.innerHTML = `
<div class="message">
QR غير موجود
</div>
`;

}

})

// إذا فشل الاتصال
.catch(error => {

console.log(error);

app.innerHTML = `
<div class="message">
حدث خطأ بالاتصال
</div>
`;

});

}

</script>

</body>
</html>
