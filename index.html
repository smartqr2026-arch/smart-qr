<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart QR</title>

<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:Arial;
    text-align:center;
    direction:rtl;
}

.container{
    padding:40px 20px;
}

.name{
    font-size:32px;
    font-weight:bold;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    max-width:400px;
    margin:auto;
}

.btn{
    background:#000;
    color:#fff;
    text-decoration:none;
    padding:18px 10px;
    border-radius:16px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    opacity:0.8;
}

.message{
    margin-top:100px;
    font-size:28px;
}

</style>
</head>

<body>

<div class="container" id="app">

<div class="message">
جاري التحميل...
</div>

</div>

<script>

const csvURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTYzdnsvSpaFn__hpVxQlKvw2HX5zt0Yb7XnSuDGLLqYWr015v9kilVG574E3A0wbdzCr0krQHvlEG-/pub?output=csv";

const params = new URLSearchParams(window.location.search);

const qrId = params.get("id");

const app = document.getElementById("app");

if(!qrId){

    app.innerHTML = `
    <div class="message">
    QR غير موجود
    </div>
    `;

}else{

fetch(csvURL)
.then(res => res.text())
.then(data => {

    const rows = data.split("\n").slice(1);

    let found = false;

    rows.forEach(row => {

        const cols = row.split(",");

        const ID = cols[0]?.trim();
        const active = cols[1]?.trim();

        const phone = cols[2]?.trim();
        const whatsapp = cols[3]?.trim();

        const facebook = cols[4]?.trim();
        const instagram = cols[5]?.trim();
        const tiktok = cols[6]?.trim();
        const snapchat = cols[7]?.trim();
        const telegram = cols[8]?.trim();

        const name = cols[9]?.trim();

        if(ID === qrId){

            found = true;

            if(active !== "YES"){

                app.innerHTML = `
                <div class="message">
                QR غير مفعل
                </div>
                `;

                return;
            }

            let buttons = "";

            if(phone){
                buttons += `
                <a class="btn"
                href="tel:${phone}">
                اتصال
                </a>
                `;
            }

            if(whatsapp){
                buttons += `
                <a class="btn"
                href="https://wa.me/962${whatsapp.substring(1)}">
                واتساب
                </a>
                `;
            }

            if(facebook === "YES"){
                buttons += `
                <a class="btn"
                href="#">
                فيسبوك
                </a>
                `;
            }

            if(instagram === "YES"){
                buttons += `
                <a class="btn"
                href="#">
                انستجرام
                </a>
                `;
            }

            if(tiktok === "YES"){
                buttons += `
                <a class="btn"
                href="#">
                تيك توك
                </a>
                `;
            }

            if(snapchat === "YES"){
                buttons += `
                <a class="btn"
                href="#">
                سناب شات
                </a>
                `;
            }

            if(telegram === "YES"){
                buttons += `
                <a class="btn"
                href="#">
                تيليجرام
                </a>
                `;
            }

            app.innerHTML = `
            <div class="container">

            <div class="name">
            ${name}
            </div>

            <div class="grid">
            ${buttons}
            </div>

            </div>
            `;
        }

    });

    if(!found){

        app.innerHTML = `
        <div class="message">
        QR غير موجود
        </div>
        `;
    }

});

}

</script>

</body>
</html>
