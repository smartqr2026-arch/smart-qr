<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART QR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#ece4d8;
min-height:100vh;
overflow-x:hidden;
direction:rtl;
}

.main{
position:relative;
min-height:100vh;
background:#ece4d8;
overflow:hidden;
}

.top-section{
position:relative;
background:#050505;
padding:40px 20px 120px;
border-bottom-left-radius:50% 12%;
border-bottom-right-radius:50% 12%;
border-bottom:4px solid #ffc400;
text-align:center;
}

.logo{
width:190px;
margin:auto;
display:block;
object-fit:contain;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:14px;
}
.slogan{
margin-top:12px;
font-size:14px;
font-weight:700;
letter-spacing:3px;
color:#d6a300;
}  
  .profile-wrapper{
position:relative;
margin-top:-70px;
z-index:10;
text-align:center;
}

.profile-image{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid #ffc400;
background:#111;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.name{
margin-top:22px;
font-size:42px;
font-weight:800;
color:#111;
}

.line{
width:120px;
height:5px;
background:#ffc400;
margin:16px auto 0;
border-radius:30px;
}

.icons-wrapper{
padding:50px 20px 160px;
max-width:850px;
margin:auto;
}

.icons-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
max-width:340px;
margin:auto;
}

.card{
background:#3a3a3a;
height:90px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
transition:.3s;
box-shadow:0 8px 18px rgba(0,0,0,.18);
}

.card::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.card i{
font-size:38px;
position:relative;
z-index:2;
}
.contact-card{
grid-column:1/-1;
height:85px;
}
.phone-icon{color:#ffc400;}
.whatsapp-icon{color:#25D366;}
.facebook-icon{color:#1877F2;}

.instagram-icon{
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tiktok-icon{color:#fff;}
.snapchat-icon{color:#FFFC00;}
.telegram-icon{color:#2AABEE;}
.email-icon{
color:#4A90E2;
}

.website-icon{
color:#FFC400;
}
.call-text{
margin-top:14px;
font-size:28px;
font-weight:700;
color:#fff;
position:relative;
z-index:2;
}

.bottom-section{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#050505;
padding:55px 20px 35px;
border-top-left-radius:50% 18%;
border-top-right-radius:50% 18%;
border-top:4px solid #ffc400;
text-align:center;
}

.footer-text{
font-size:30px;
font-weight:800;
color:#fff;
letter-spacing:2px;
}

.footer-text span{
color:#ffc400;
}

.message{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:800;
color:#fff;
padding:20px;
text-align:center;
background:#000;
}

@media(max-width:768px){

.logo{
width:180px;
}

.profile-image{
width:120px;
height:120px;
}

.name{
font-size:34px;
}

.icons-grid{
grid-template-columns:repeat(2,1fr);
gap:22px;
}

.card{
min-height:150px;
}

.card i{
font-size:52px;
}

}

@media(max-width:500px){

.icons-grid{
grid-template-columns:repeat(2,1fr);
}

.card{
min-height:135px;
border-radius:28px;
}

.card i{
font-size:46px;
}

.call-text{
font-size:24px;
}

.name{
font-size:28px;
}

.footer-text{
font-size:22px;
}

}

</style>
</head>

<body>

<div id="app">

<div class="message">
جاري التحميل...
</div>

</div>

<script>

// رابط CSV
const csvURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTYzdnsvSpaFn__hpVxQlKvw2HX5zt0Yb7XnSuDGLLqYWr015v9kilVG574E3A0wbdzCr0krQHvlEG-/pub?output=csv";

// قراءة ID من الرابط
const params = new URLSearchParams(window.location.search);

const qrId = params.get("id");

// عنصر التطبيق
const app = document.getElementById("app");

// إذا لا يوجد ID
if(!qrId){

app.innerHTML = `
<div class="message">
QR غير موجود
</div>
`;

}else{

fetch(csvURL)

.then(res => res.text())

.then(data => {

const rows = data.trim().split("\n").slice(1);

let found = false;

rows.forEach(row => {

const cols = row.split(",");

const ID = cols[0]?.trim();
const active = cols[1]?.trim();
const phone = cols[2]?.trim();
const emergency = cols[10]?.replace(/'/g, "").trim();
console.log(cols);
const whatsapp = cols[3]?.trim();
const waNumber = whatsapp
.replace(/\s/g, "")
.replace(/[^\d]/g, "")
.replace(/^0/, "962");
const facebook = cols[4]?.trim();
const instagram = cols[5]?.trim();
const tiktok = cols[6]?.trim();
const snapchat = cols[7]?.trim();
const telegram = cols[8]?.trim();
const name = cols[9]?.trim();
const website = cols[12]?.trim();
const email = cols[11]?.trim();
  
// مطابقة ID
if(ID === qrId){

found = true;

// إذا غير مفعل
if(active !== "YES"){

app.innerHTML = `
<div class="message">
QR غير مفعل
</div>
`;

return;

}

let buttons = "";

// اتصال
if(phone && phone !== "NO"){

buttons += `
<a class="card contact-card" href="tel:${phone}">
<i class="fa-solid fa-phone-volume phone-icon"></i>
<div class="call-text">اتصال</div>
</a>
`;

}
// رقم طوارئ
if(emergency && emergency !== "NO"){

buttons += `
<a class="card contact-card" href="tel:${emergency}">
<i class="fa-solid fa-phone phone-icon"></i>
<div class="call-text">رقم طوارئ</div>
</a>
`;

}

// واتساب
if(whatsapp && whatsapp !== "NO"){

const waNumber = whatsapp.replace(/^0/, "962");

buttons += `
<a class="card" href="https://wa.me/${waNumber}" target="_blank">
<i class="fa-brands fa-whatsapp whatsapp-icon"></i>
</a>
`;

}

// فيسبوك
if(facebook && facebook !== "NO"){

buttons += `
<a class="card" href="${facebook}" target="_blank">
<i class="fa-brands fa-facebook-f facebook-icon"></i>
</a>
`;

}

// انستجرام
if(instagram && instagram !== "NO"){

buttons += `
<a class="card" href="${instagram}" target="_blank">
<i class="fa-brands fa-instagram instagram-icon"></i>
</a>
`;

}

// تيك توك
if(tiktok && tiktok !== "NO"){

buttons += `
<a class="card" href="${tiktok}" target="_blank">
<i class="fa-brands fa-tiktok tiktok-icon"></i>
</a>
`;

}

// سناب
if(snapchat && snapchat !== "NO"){

buttons += `
<a class="card" href="${snapchat}" target="_blank">
<i class="fa-brands fa-snapchat snapchat-icon"></i>
</a>
`;

}

// تيليجرام
if(telegram && telegram !== "NO"){

buttons += `
<a class="card" href="${telegram}" target="_blank">
<i class="fa-brands fa-telegram telegram-icon"></i>
</a>
`;

}
// Website
if(website && website !== "NO"){

buttons += `
<a class="card" href="${website}" target="_blank">
<i class="fa-solid fa-globe website-icon"></i>
</a>
`;

}
  // Email
if(email && email !== "NO"){

buttons += `
<a class="card" href="mailto:${email}">
<i class="fa-solid fa-envelope email-icon"></i>
</a>
`;

}
// صورة المستخدم
const profileImage =
`https://smartqr2026-arch.github.io/smart-qr/users/${ID}.jpg`;

// عرض الصفحة
app.innerHTML = `

<div class="main">

<div class="top-section">

<img class="logo" src="logo.png">

<div class="slogan">
SCAN • CONNECT • CARE
</div>

<div class="profile-wrapper">

<img
class="profile-image"
src="${profileImage}"

onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">

<div class="name">
${name}
</div>

<div class="line"></div>

</div>

<div class="icons-wrapper">

<div class="icons-grid">

${buttons}

</div>

</div>

<div class="bottom-section">

<div class="footer-text">
SCAN • CONNECT • <span>CARE</span>
</div>

</div>

</div>

`;

}

});

// إذا لم يجد المستخدم
if(!found){

app.innerHTML = `
<div class="message">
QR غير موجود
</div>
`;

}

})

// إذا فشل الاتصال
.catch(error => {

console.log(error);

app.innerHTML = `
<div class="message">
حدث خطأ بالاتصال
</div>
`;

});

}

</script>

</body>
</html>
